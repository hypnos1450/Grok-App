name: Release

# Builds, signs, and publishes installers for every version tag (e.g. v0.1.0).
on:
  push:
    tags:
      - 'v*'

# The default GITHUB_TOKEN is read-only; electron-builder needs write to
# create the GitHub Release and upload installers.
permissions:
  contents: write

jobs:
  # Create the draft release BEFORE the matrix fans out. electron-builder does a
  # find-or-create per job, and a draft release does not reserve its tag — so
  # three jobs starting at once each find nothing and each create their own
  # draft. Assets then scatter across the duplicates and `gh release edit`
  # publishes only whichever one the tag resolves to, silently shipping a
  # partial release (v0.5.4 lost all Linux artifacts this way; v0.4.3/v0.4.4
  # too). With the draft already present, all three jobs find the same one.
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Create the draft release
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists — reusing it."
          else
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --draft --title "${GITHUB_REF_NAME#v}" --notes "Build in progress…"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        # windows-latest currently ships VS 18, which the node-gyp bundled
        # with electron-builder cannot detect. Pin to windows-2022 (VS 2022).
        os: [macos-latest, windows-2022, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      # node-pty rebuild needs a C++ toolchain + Python (node-gyp).
      # @electron/rebuild@4 / node-abi require Node >= 22.12.
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      # Python 3.12+ dropped distutils; node-gyp still imports it.
      # setuptools restores a compatible distutils. Pin 3.12 for consistency.
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install setuptools for node-gyp
        run: python -m pip install --upgrade setuptools

      # Expose cl.exe / link.exe / Windows SDK so node-gyp can build node-pty.
      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: npm ci
        env:
          # Help node-gyp locate VS 2022 on windows-2022.
          npm_config_msvs_version: '2022'

      - name: Typecheck
        run: npm run typecheck

      - name: Build and publish
        shell: bash
        # Only hand signing credentials to electron-builder when the secrets
        # are actually set — an empty CSC_LINK makes it try to read a
        # certificate from the repo root and the build fails ("not a file").
        run: |
          if [ -n "${CSC_LINK_SECRET:-}" ]; then
            export CSC_LINK="$CSC_LINK_SECRET"
            export CSC_KEY_PASSWORD="${CSC_KEY_PASSWORD_SECRET:-}"
          fi
          npm run build && npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_msvs_version: '2022'
          # macOS signing + notarization (set these repo secrets to enable)
          CSC_LINK_SECRET: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_SECRET: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  # electron-builder can only attach assets to DRAFT releases, so the matrix
  # jobs upload to a shared draft; this attaches the CHANGELOG notes for the
  # tagged version and publishes it once they all finish.
  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Publishing a release that is missing a platform is worse than failing:
      # the update manifests are what clients poll, so a missing latest-*.yml
      # silently strands that platform on the previous version. Fail instead.
      - name: Verify every platform made it into the release
        run: |
          dupes=$(gh api "/repos/$GITHUB_REPOSITORY/releases" \
            --jq "[.[] | select(.tag_name==\"$GITHUB_REF_NAME\")] | length")
          if [ "$dupes" != "1" ]; then
            echo "::error::Found $dupes releases tagged $GITHUB_REF_NAME (expected 1) — assets have scattered across duplicate drafts."
            exit 1
          fi
          assets=$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')
          echo "$assets"
          missing=""
          for want in latest.yml latest-mac.yml latest-linux.yml .exe .dmg .AppImage .deb; do
            echo "$assets" | grep -q -- "$want" || missing="$missing $want"
          done
          if [ -n "$missing" ]; then
            echo "::error::Release $GITHUB_REF_NAME is missing:$missing"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish the release with CHANGELOG notes
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v v="$ver" '
            $0 ~ "^## "v" " || $0 == "## "v { hit=1; next }
            /^## / { hit=0 }
            hit
          ' CHANGELOG.md > /tmp/notes.md
          if [ -s /tmp/notes.md ]; then
            gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --notes-file /tmp/notes.md --draft=false
          else
            echo "No CHANGELOG section for $ver — publishing without notes."
            gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
