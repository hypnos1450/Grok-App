name: Release

# Builds, signs, and publishes installers for every version tag (e.g. v0.1.0).
on:
  push:
    tags:
      - 'v*'

# The default GITHUB_TOKEN is read-only; electron-builder needs write to
# create the GitHub Release and upload installers.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build and publish
        shell: bash
        # Only hand signing credentials to electron-builder when the secrets
        # are actually set — an empty CSC_LINK makes it try to read a
        # certificate from the repo root and the build fails ("not a file").
        run: |
          if [ -n "${CSC_LINK_SECRET:-}" ]; then
            export CSC_LINK="$CSC_LINK_SECRET"
            export CSC_KEY_PASSWORD="${CSC_KEY_PASSWORD_SECRET:-}"
          fi
          npm run build && npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization (set these repo secrets to enable)
          CSC_LINK_SECRET: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_SECRET: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
